name: ci

on:
  pull_request:
  push:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: source_simulator_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d source_simulator_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      SIMULATOR_POSTGRES_TEST_URL: postgres://postgres:postgres@localhost:5432/source_simulator_test
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: pnpm install --frozen-lockfile
      - run: pnpm run verify
