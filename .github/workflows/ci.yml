name: ci

on:
  pull_request:
  push:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: source_simulator_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d source_simulator_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      SIMULATOR_POSTGRES_TEST_URL: postgres://postgres:postgres@localhost:5432/source_simulator_test
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: pnpm install --frozen-lockfile
      - run: pnpm run verify
      - run: docker build -t workforce-one-source-simulator:ci .
      - name: Container smoke test
        run: |
          docker run --rm -d --network host \
            --name source-simulator-smoke \
            -e PORT=3000 \
            -e SIMULATOR_RUNTIME_ENV=production \
            -e DATABASE_URL="$SIMULATOR_POSTGRES_TEST_URL" \
            -e SIMULATOR_ADMIN_API_KEY=ci-admin-key \
            -e SIMULATOR_CONNECTION_CREDENTIALS='{"ci-product-manager":"conn-product-manager"}' \
            workforce-one-source-simulator:ci
          for attempt in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:3000/readyz >/tmp/source-sim-ready.json; then
              cat /tmp/source-sim-ready.json
              docker stop source-simulator-smoke
              exit 0
            fi
            sleep 1
          done
          docker logs source-simulator-smoke
          docker stop source-simulator-smoke || true
          exit 1
